<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbiter Admin — Publish HTML</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@300;400;500;600&family=Noto+Serif+JP:wght@200;300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <script src="/theme.js"></script>
  <style>
    .publish-layout { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }
    .publish-col { display:flex; flex-direction:column; gap:16px; }
    .publish-card { background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius); padding:24px 28px; }
    @media(max-width:900px){ .publish-layout { grid-template-columns:1fr; } }
    .publish-card-header { font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; display:flex; align-items:center; gap:7px; }
    .publish-card-header::before { content:"\25C6"; color:var(--gold); font-size:5px; }
    .publish-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
    .publish-stat { text-align:center; padding:14px 8px; background:var(--bg1); border-radius:var(--radius); border:1px solid var(--line); }
    .publish-stat-num { font-size:22px; font-weight:600; color:var(--heading); font-family:var(--display); letter-spacing:-0.02em; }
    .publish-stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }
    .publish-site-info { font-size:12px; color:var(--text); display:flex; flex-direction:column; gap:4px; }
    .publish-site-info span { color:var(--muted); font-size:11px; }
    .publish-site-info a { color:var(--accent); font-size:11px; }
    .publish-theme-picker { display:flex; flex-direction:column; gap:8px; }
    .publish-theme-option { display:flex; flex-direction:column; gap:3px; padding:12px 16px; border:1px solid var(--line); border-radius:var(--radius); cursor:pointer; transition:all .15s; }
    .publish-theme-option:hover { border-color:var(--gold); }
    .publish-theme-option.active { border-color:var(--gold); background:color-mix(in srgb,var(--gold) 6%,transparent); }
    .publish-theme-name { font-size:13px; font-weight:600; color:var(--heading); }
    .publish-theme-desc { font-size:11px; color:var(--muted); line-height:1.5; }
    .publish-generate-wrap { display:flex; flex-direction:column; gap:12px; }
    .publish-desc { font-size:11px; color:var(--muted); line-height:1.6; }
    .publish-progress { display:none; align-items:center; gap:10px; }
    .publish-progress.active { display:flex; }
    .publish-progress-text { font-size:11px; color:var(--muted); }
    .publish-includes { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
    .publish-includes span { font-size:10px; padding:3px 10px; background:var(--bg1); border:1px solid var(--line); border-radius:12px; color:var(--text); font-family:var(--mono); }
    .publish-note { font-size:11px; color:var(--muted); line-height:1.6; }
    .publish-astro { background:color-mix(in srgb,var(--accent) 5%,var(--bg2)); border-color:color-mix(in srgb,var(--accent) 20%,var(--line)); }
    .publish-astro code { font-family:var(--mono); font-size:10px; background:var(--bg1); padding:1px 5px; border-radius:3px; }
    .publish-astro a { color:var(--accent); font-size:11px; }
    .publish-compare { display:flex; flex-direction:column; gap:10px; }
    .publish-compare-row { display:flex; align-items:baseline; gap:10px; font-size:11px; line-height:1.5; }
    .publish-compare-label { font-weight:600; color:var(--heading); white-space:nowrap; min-width:90px; font-size:11px; }
    .publish-compare-desc { color:var(--muted); }
    .banner { padding:8px 16px; font-size:10px; display:flex; align-items:center; gap:6px; border-radius:var(--radius); margin-bottom:14px; }
    .banner-ok  { background:var(--jade-bg); color:var(--jade); border:1px solid rgba(45,139,106,.2); }
    .banner-ok::before { content:"\2713"; }
    .banner-err { background:rgba(139,38,53,.07); color:var(--red); border:1px solid rgba(139,38,53,.15); }
    .banner-err::before { content:"\2715"; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="logo" href="/dashboard.html"><div class="logo-mark">OR</div>Orbiter</a>
      <div class="topbar-right">
        <button class="search-trigger" id="search-btn" title="Search (⌘K)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search <kbd>⌘K</kbd>
        </button>
        <button class="scheme-toggle" id="scheme-toggle" title="Toggle scheme">&#9684;</button>
        <span class="user" id="topbar-user"></span>
        <span class="logout" id="logout-btn">Sign out</span>
      </div>
    </header>
    <nav class="sidebar">
      <div class="nav-section">Content</div>
      <a class="nav-item" href="/dashboard.html"><span class="nav-icon">&#9672;</span>Dashboard</a>
      <a class="nav-item" href="/collections.html"><span class="nav-icon">&#8862;</span>Collections</a>
      <div class="nav-section">Assets</div>
      <a class="nav-item" href="/media.html"><span class="nav-icon">&#8863;</span>Media</a>
      <div class="nav-section">Tools</div>
      <a class="nav-item" href="/inbox.html"><span class="nav-icon">&#9993;</span>Inbox</a>
      <a class="nav-item" href="/snippets.html"><span class="nav-icon">&#8935;</span>Snippets</a>
      <div class="nav-section">System</div>
      <a class="nav-item" href="/schema.html"><span class="nav-icon">&#9672;</span>Schema</a>
      <a class="nav-item" href="/build.html"><span class="nav-icon">&#9650;</span>Build</a>
      <a class="nav-item active" href="/publish.html"><span class="nav-icon">&#9670;</span>Publish HTML</a>
      <a class="nav-item" href="/settings.html"><span class="nav-icon">&#9678;</span>Settings</a>
      <a class="nav-item admin-only" href="/users.html" style="display:none"><span class="nav-icon">&#9673;</span>Users</a>
      <div class="sidebar-footer">
        <div class="pod-name" id="pod-name">content.pod</div>
        <div class="pod-info" id="pod-info"></div>
        <div class="pod-version" id="pod-version"></div>
        <div class="pod-status"><span class="pod-dot"></span>pod synced</div>
      </div>
    </nav>
    <main class="main">
      <div class="page-header glass-card">
        <h1 class="page-title">Publish HTML</h1>
        <p class="page-sub">Generate a complete static website from your published content</p>
      </div>
      <div id="banner" class="banner" style="display:none"></div>
      <div id="content"><div class="empty"><div class="spinner"></div></div></div>

  <script type="module">
    const me = await fetch('/api/auth/me',{credentials:'include'}).then(r=>r.json()).catch(()=>null);
    if (!me?.user) { location.replace('/login.html'); throw new Error('unauthenticated'); }
    document.getElementById('topbar-user').textContent = me.user.username;
    if (me.user.role==='admin') document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
    document.getElementById('logout-btn').addEventListener('click',async()=>{
      await fetch('/api/auth/logout',{method:'POST',credentials:'include'});
      location.replace('/login.html');
    });

    function showBanner(cls, text) {
      const el = document.getElementById('banner');
      el.className = 'banner ' + cls;
      el.textContent = text;
      el.style.display = '';
      setTimeout(()=>el.style.display='none', 5000);
    }

    const [status, themeData] = await Promise.all([
      fetch('/api/publish/status',{credentials:'include'}).then(r=>r.json()).catch(()=>({collections:0,entries:0,media:0,siteName:'',siteUrl:''})),
      fetch('/api/publish/themes',{credentials:'include'}).then(r=>r.json()).catch(()=>({themes:[],default:'orbit'})),
    ]);

    let selectedTheme = themeData.default || 'orbit';
    const allThemes = themeData.themes || [];

    const wrap = document.getElementById('content');
    wrap.innerHTML = `
      <div class="publish-layout">

        <div class="publish-col">

          <div class="publish-card">
            <div class="publish-card-header">Site Overview</div>
            <div class="publish-stats">
              <div class="publish-stat">
                <div class="publish-stat-num">${status.entries}</div>
                <div class="publish-stat-label">Published</div>
              </div>
              <div class="publish-stat">
                <div class="publish-stat-num">${status.collections}</div>
                <div class="publish-stat-label">Collections</div>
              </div>
              <div class="publish-stat">
                <div class="publish-stat-num">${status.media}</div>
                <div class="publish-stat-label">Media</div>
              </div>
            </div>
            <div class="publish-site-info">
              ${status.siteName
                ? `<strong>${status.siteName}</strong>`
                : `<span>No site name configured</span>`}
              ${status.siteUrl
                ? `<span>${status.siteUrl}</span>`
                : `<a href="/settings.html">Configure site URL in Settings</a>`}
            </div>
            <div class="publish-note" style="margin-top:12px">Only entries with status <strong>published</strong> are included. Drafts, scheduled, and trashed entries are excluded.</div>
          </div>

          <div class="publish-card">
            <div class="publish-card-header">Theme</div>
            <div class="publish-theme-picker" id="theme-picker">
              ${allThemes.map(t => `<label class="publish-theme-option${t.id === selectedTheme ? ' active' : ''}">
                <input type="radio" name="theme" value="${t.id}" ${t.id === selectedTheme ? 'checked' : ''} hidden>
                <span class="publish-theme-name">${t.name}</span>
                <span class="publish-theme-desc">${t.description || ''}</span>
              </label>`).join('\n              ')}
            </div>
          </div>

          <div class="publish-card">
            <div class="publish-card-header">Generate &amp; Download</div>
            <div class="publish-generate-wrap">
              <div class="publish-desc">
                Download as ZIP and deploy to any static hosting — Netlify, Vercel, GitHub Pages, or upload via FTP.
              </div>
              ${status.entries > 0
                ? `<button class="btn btn-primary" id="generate-btn" style="min-width:200px;">&#9670; Generate Static Site</button>`
                : `<button class="btn btn-primary" disabled style="min-width:200px;opacity:.5;cursor:not-allowed">No published entries</button>`}
              <div class="publish-progress" id="progress">
                <div class="spinner" style="width:14px;height:14px;border-width:2px"></div>
                <span class="publish-progress-text" id="progress-text">Generating...</span>
              </div>
            </div>
          </div>

        </div>

        <div class="publish-col">

          <div class="publish-card">
            <div class="publish-card-header">What gets published</div>
            <div class="publish-includes">
              <span>Entry pages</span>
              <span>Collection indexes</span>
              <span>Homepage</span>
              <span>Media files</span>
              <span>sitemap.xml</span>
              <span>robots.txt</span>
              <span>OG meta tags</span>
              <span>Reading time</span>
              <span>Dark mode</span>
            </div>
            <div class="publish-note">Each published entry gets its own page. Collections get index pages with cards. All referenced media (images, PDFs) are extracted and bundled. The result is a self-contained ZIP you can deploy anywhere.</div>
          </div>

          <div class="publish-card publish-astro">
            <div class="publish-card-header">Need more control?</div>
            <div class="publish-note" style="color:var(--text)">
              Use Orbiter as a <strong>headless CMS</strong> with an Astro project for full control over templates, layouts, and components.
            </div>
            <div class="publish-note" style="margin-top:8px">
              <code>npm i @a83/orbiter-integration</code> — then use <code>getCollection()</code> and <code>getEntry()</code> in your Astro pages. Supports SSR and SSG.
              <br><a href="https://www.npmjs.com/package/@a83/orbiter-integration" target="_blank" rel="noopener">View on npm &rarr;</a>
            </div>
          </div>

          <div class="publish-card">
            <div class="publish-card-header">How this differs from Build &amp; Deploy</div>
          <div class="publish-compare">
            <div class="publish-compare-row">
              <span class="publish-compare-label">Publish HTML</span>
              <span class="publish-compare-desc">Standalone static site from your content. No build tools, no Astro, no config. The simplest way to get a website.</span>
            </div>
            <div class="publish-compare-row">
              <span class="publish-compare-label">Build webhook</span>
              <span class="publish-compare-desc">Triggers an external build system (Netlify, Vercel, GitHub Actions) that builds your custom Astro project.</span>
            </div>
            <div class="publish-compare-row">
              <span class="publish-compare-label">FTP Deploy</span>
              <span class="publish-compare-desc">Uploads your Astro project's <code style="font-family:var(--mono);font-size:10px;background:var(--bg1);padding:1px 4px;border-radius:3px">dist/</code> folder to shared hosting via FTP/FTPS.</span>
            </div>
          </div>
        </div>

        </div>

      </div>
    `;

    document.getElementById('theme-picker')?.addEventListener('change', (e) => {
      if (e.target.name === 'theme') {
        selectedTheme = e.target.value;
        document.querySelectorAll('.publish-theme-option').forEach(el => el.classList.toggle('active', el.querySelector('input').value === selectedTheme));
      }
    });

    document.getElementById('generate-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('generate-btn');
      const progress = document.getElementById('progress');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      progress.classList.add('active');

      try {
        const res = await fetch('/api/publish/generate', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ theme: selectedTheme, siteName: status.siteName || 'site' }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: 'Generation failed' }));
          throw new Error(err.error || 'Generation failed');
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const name = (status.siteName || 'site').replace(/[^a-z0-9_-]/gi, '-').toLowerCase();
        a.download = name + '.zip';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        showBanner('banner-ok', `Site generated — ${status.entries} entries, ${status.media} media files`);
      } catch (err) {
        showBanner('banner-err', err.message || 'Generation failed');
      } finally {
        btn.disabled = false;
        btn.textContent = '◆ Generate Static Site';
        progress.classList.remove('active');
      }
    });
  </script>
</main>
  </div>
  <script src="/search.js"></script>
  <script src="/sidebar.js"></script>
  <script src="/router.js"></script>
</body>
</html>
