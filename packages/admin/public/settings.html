<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbiter Admin — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@300;400;500;600&family=Noto+Serif+JP:wght@200;300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css" />
  <script src="/theme.js"></script>
  <style>
    .settings-wrap { max-width:1100px; padding-bottom:24px; }

    /* Two-column grid for settings groups */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-items: start;
      margin-bottom: 8px;
    }
    .settings-grid .settings-group { margin-bottom: 0; }
    .settings-wrap > .settings-group { margin-bottom: 8px; }

    @media (max-width: 720px) {
      .settings-wrap { max-width: 720px; }
      .settings-grid { grid-template-columns: 1fr; }
    }

    /* Toggle switch */
    .toggle { position:relative; display:inline-block; width:36px; height:20px; flex-shrink:0; cursor:pointer; justify-self:end; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:var(--line); border-radius:10px; transition:background 0.2s; }
    .toggle-slider::before { content:''; position:absolute; width:16px; height:16px; left:2px; bottom:2px; background:var(--bg0); border-radius:50%; transition:transform 0.2s; }
    .toggle input:checked + .toggle-slider { background:var(--accent); }
    .toggle input:checked + .toggle-slider::before { transform:translateX(16px); }

    /* Card — einheitliches bg2, eine Farbe, kein Alternieren */
    .settings-group {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
    }

    /* Section label — klein, ruhig, ◆ statt Left-Strip */
    .group-header {
      padding: 8px 20px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .group-header::before { content: "◆"; color: var(--gold); font-size: 5px; line-height: 1; }

    /* Setting row — hover, keine alternierenden Hintergründe */
    .setting-row {
      display: grid;
      grid-template-columns: 1fr 220px;
      align-items: center;
      gap: 16px;
      padding: 11px 20px;
      border-bottom: 1px solid var(--line2);
      transition: background 0.1s;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-row:hover { background: var(--hover-bg); }
    .setting-label { font-size: 13px; color: var(--heading); margin-bottom: 3px; }
    .setting-desc { font-size: 11px; color: var(--mid); line-height: 1.55; }

    /* Inputs — vollständig gerundete Box, weicher Focus */
    .settings-wrap .input {
      width: 100%;
      background: var(--bg0);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 11px;
      color: var(--heading);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .settings-wrap .input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }
    .settings-wrap .input[readonly] {
      color: var(--muted);
      cursor: default;
      background: var(--bg1);
    }

    /* Save row */
    .save-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 10px 20px;
      border-top: 1px solid var(--line);
      gap: 10px;
    }

    /* Banners */
    .banner { padding: 8px 16px; font-size: 11px; display: flex; align-items: center; gap: 8px; border-radius: 8px; margin-bottom: 8px; }
    .banner-ok  { background: var(--jade-bg); color: var(--jade); border: 1px solid rgba(45,139,106,.2); }
    .banner-ok::before { content: "✓"; font-size: 12px; }
    .banner-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(240,112,128,.18); }
    .banner-err::before { content: "✕"; font-size: 12px; }

    /* Theme cards */
    .theme-cards { display: flex; gap: 10px; flex-wrap: wrap; }
    .theme-card {
      flex: 1; min-width: 110px;
      background: var(--bg0);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 14px 12px;
      cursor: pointer;
      text-align: left;
      font-family: var(--mono);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .theme-card:hover { border-color: var(--mid); box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .theme-card.active { border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 0 1px var(--accent); }
    .theme-swatch { display: flex; gap: 4px; margin-bottom: 10px; height: 4px; }
    .theme-swatch span { flex: 1; border-radius: 2px; }
    .theme-card-name { font-size: 12px; color: var(--heading); margin-bottom: 2px; font-weight: 500; }
    .theme-card-sub  { font-size: 10px; color: var(--mid); letter-spacing: 0.03em; line-height: 1.4; }

    /* Style cards */
    .style-cards { display: flex; gap: 10px; }
    .style-card {
      flex: 1; min-width: 120px; max-width: 180px;
      background: var(--bg0); border: 1px solid var(--line); border-radius: 8px;
      padding: 12px 12px 10px; cursor: pointer; text-align: left;
      font-family: var(--mono); transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .style-card:hover { border-color: var(--mid); box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .style-card.active { border-color: var(--accent); background: var(--accent-bg); box-shadow: 0 0 0 1px var(--accent); }
    .style-preview {
      display: flex; gap: 5px; height: 44px; margin-bottom: 10px;
      background: var(--bg3); border-radius: 5px; overflow: hidden; position: relative;
    }
    .sp-sidebar { width: 14px; background: var(--bg2); flex-shrink: 0; }
    .sp-body { flex: 1; padding: 5px 5px; display: flex; flex-direction: column; gap: 4px; }
    .sp-row { height: 6px; background: var(--bg2); border-radius: 2px; }
    .sp-row-short { width: 65%; }
    /* Glass preview */
    .sp-glass { background: var(--bg0); }
    .sp-orb { position: absolute; border-radius: 50%; }
    .sp-orb1 { width: 40px; height: 40px; top: -10px; left: 10px; background: var(--accent-bg); filter: blur(8px); }
    .sp-orb2 { width: 30px; height: 30px; bottom: -5px; right: 10px; background: var(--gold-bg); filter: blur(6px); }
    .sp-glass-panel { background: color-mix(in srgb, var(--bg2) 60%, transparent); backdrop-filter: blur(4px); border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent); border-radius: 3px; }
    .sp-glass .sp-sidebar { width: 14px; background: color-mix(in srgb, var(--bg1) 55%, transparent); backdrop-filter: blur(4px); }

    /* Pod section */
    .pod-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 20px;
      border-bottom: 1px solid var(--line2);
    }
    .pod-meta-path {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .pod-meta-ver {
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 2px 8px;
    }
    .pod-col-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 20px;
      border-bottom: 1px solid var(--line2);
      transition: background 0.1s;
    }
    .pod-col-row:last-child { border-bottom: none; }
    .pod-col-row:hover { background: var(--hover-bg); }
    .pod-col-name { font-size: 13px; color: var(--text); }
    .pod-col-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--bg3);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 2px 8px;
    }

    /* Pod stats strip */
    .pod-stat-label { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }

    /* Support */
    .support-widget {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 20px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      background: var(--bg2);
    }
    .support-copy-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .support-copy-text { font-size: 12px; color: var(--text); line-height: 1.6; }
    .btn-support {
      flex-shrink: 0;
      padding: 8px 18px;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      border-radius: 6px;
    }
    .btn-support:hover { background: var(--gold); color: var(--bg0); }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a class="logo" href="/dashboard.html"><div class="logo-mark">OR</div>Orbiter</a>
      <div class="topbar-right">
        <button class="search-trigger" id="search-btn" title="Search (⌘K)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Search <kbd>⌘K</kbd>
        </button>
        <button class="scheme-toggle" id="scheme-toggle" title="Toggle scheme">◐</button>
        <span class="user" id="topbar-user"></span>
        <span class="logout" id="logout-btn">Sign out</span>
      </div>
    </header>
    <nav class="sidebar">
      <div class="nav-section">Content</div>
      <a class="nav-item" href="/dashboard.html"><span class="nav-icon">◈</span>Dashboard</a>
      <a class="nav-item" href="/collections.html"><span class="nav-icon">⊞</span>Collections</a>
      <div class="nav-section">Assets</div>
      <a class="nav-item" href="/media.html"><span class="nav-icon">⊟</span>Media</a>
      <div class="nav-section">Tools</div>
      <a class="nav-item" href="/inbox.html"><span class="nav-icon">✉</span>Inbox</a>
      <a class="nav-item" href="/snippets.html"><span class="nav-icon">⌗</span>Snippets</a>

      <div class="nav-section">System</div>
      <a class="nav-item" href="/schema.html"><span class="nav-icon">◈</span>Schema</a>
      <a class="nav-item" href="/build.html"><span class="nav-icon">▲</span>Build</a>
      <a class="nav-item active" href="/settings.html"><span class="nav-icon">◎</span>Settings</a>
      <a class="nav-item admin-only" href="/users.html" style="display:none"><span class="nav-icon">◉</span>Users</a>
            <a class="nav-item admin-only" href="/pods.html" style="display:none"><span class="nav-icon">◈</span>Pods</a>
      <div class="sidebar-footer">
        <div class="pod-name" id="pod-name">content.pod</div>
        <div class="pod-info" id="pod-info"></div>
        <div class="pod-version" id="pod-version"></div>
        <div class="pod-status"><span class="pod-dot"></span>pod synced</div>
      </div>
    </nav>
    <main class="main">
      <div class="page-header glass-card" style="display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;margin-bottom:4px;">
        <h1 class="page-title">Settings</h1>
        <div style="display:flex;align-items:center;gap:10px">
          <span id="header-save-msg" style="font-size:10px;color:var(--jade);opacity:0;transition:opacity .3s"></span>
          <button type="submit" form="site-form" class="btn-save" id="header-save-btn">Save settings</button>
        </div>
      </div>
      <div class="settings-wrap" id="settings-content">
        <div class="empty"><div class="spinner"></div></div>
      </div>
    
  <script type="module">
    const me = await fetch('/api/auth/me',{credentials:'include'}).then(r=>r.json()).catch(()=>null);
    if (!me?.user) { location.replace('/login.html'); throw new Error('unauthenticated'); }
    document.getElementById('topbar-user').textContent = me.user.username;
    if (me.user.role==='admin') document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');
    document.getElementById('logout-btn').addEventListener('click',async()=>{
      await fetch('/api/auth/logout',{method:'POST',credentials:'include'});
      location.replace('/login.html');
    });

    const meta = await fetch('/api/meta',{credentials:'include'}).then(r=>r.json()).catch(()=>({}));

    const get = k => meta[k] ?? '';
    // pod-info managed by sidebar.js

    function showBanner(id, cls, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.className = 'banner ' + cls;
      el.textContent = (cls==='banner-ok'?'✓ ':'✕ ') + text;
      el.style.display = '';
      setTimeout(()=>el.style.display='none', 3500);
    }

    async function saveMeta(pairs) {
      const body = Object.fromEntries(pairs);
      await fetch('/api/meta', {
        method:'PUT', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
    }

    const ghConfigured   = !!(get('github.token') && get('github.repo'));
    const currentTheme  = get('ui.theme') || 'space';
    const currentScheme = localStorage.getItem('orb_scheme') || 'auto';
    const currentStyle  = localStorage.getItem('orb_style')  || 'classic';

    const wrap = document.getElementById('settings-content');
    wrap.innerHTML = `
      <div id="site-banner" class="banner" style="display:none"></div>

      <!-- All settings — one form -->
      <form id="site-form">
        <div class="settings-grid">
        <div class="settings-group">
          <div class="group-header">Site</div>
          <div class="setting-row">
            <div><div class="setting-label">Site name</div><div class="setting-desc">Displayed in the admin header</div></div>
            <input class="input" name="site.name" value="${get('site.name')}" placeholder="My Site" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Site URL</div><div class="setting-desc">Production URL for preview links</div></div>
            <input class="input" name="site.url" value="${get('site.url')}" placeholder="https://example.com" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Description</div><div class="setting-desc">Short site description</div></div>
            <input class="input" name="site.description" value="${get('site.description')}" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Primary locale</div><div class="setting-desc">Default language code, e.g. en</div></div>
            <input class="input" name="site.locale" value="${get('site.locale')}" placeholder="en" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Additional locales</div><div class="setting-desc">Comma-separated, e.g. en,de,fr</div></div>
            <input class="input" name="site.locales" value="${get('site.locales')}" placeholder="en,de" />
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">Dashboard widgets</div>
          <div class="setting-row">
            <div><div class="setting-label">Calendar</div><div class="setting-desc">Mini calendar + upcoming entries</div></div>
            <label class="toggle"><input type="checkbox" name="dashboard.show_calendar" ${get('dashboard.show_calendar')!=='0'?'checked':''} /><span class="toggle-slider"></span></label>
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Recently edited</div><div class="setting-desc">Latest entries across all collections</div></div>
            <label class="toggle"><input type="checkbox" name="dashboard.show_recent" ${get('dashboard.show_recent')!=='0'?'checked':''} /><span class="toggle-slider"></span></label>
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Collections</div><div class="setting-desc">Collection cards with publish stats</div></div>
            <label class="toggle"><input type="checkbox" name="dashboard.show_collections" ${get('dashboard.show_collections')!=='0'?'checked':''} /><span class="toggle-slider"></span></label>
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Notes &amp; To-Do</div><div class="setting-desc">Workspace panels (hidden in Station mode)</div></div>
            <label class="toggle"><input type="checkbox" name="dashboard.show_workspace" ${get('dashboard.show_workspace')!=='0'?'checked':''} /><span class="toggle-slider"></span></label>
          </div>
        </div>
        <div class="settings-group">
          <div class="group-header">AI Assistant</div>
          <div class="setting-row">
            <div><div class="setting-label">Provider</div><div class="setting-desc">Choose your AI backend. Gemini and Ollama are free.</div></div>
            <select class="input" name="ai.provider" id="ai-provider-select" style="appearance:auto">
              <option value="gemini" ${get('ai.provider')==='gemini'?'selected':''}>★ Google Gemini — free tier (recommended)</option>
              <option value="ollama" ${get('ai.provider')==='ollama'||!get('ai.provider')?'selected':''}>Ollama — local, free, no API key</option>
              <option value="anthropic" ${get('ai.provider')==='anthropic'?'selected':''}>Anthropic (Claude) — API key required</option>
              <option value="openai" ${get('ai.provider')==='openai'?'selected':''}>OpenAI (GPT) — API key required</option>
            </select>
          </div>
          <div id="ai-hint" style="padding:6px 20px;font-size:10px;color:var(--mid);line-height:1.6;border-bottom:1px solid var(--line2)"></div>
          <div class="setting-row">
            <div><div class="setting-label">Model</div><div class="setting-desc">Leave empty for default</div></div>
            <input class="input" name="ai.model" value="${get('ai.model')}" placeholder="gemini-2.5-flash" />
          </div>
          <div class="setting-row" id="ai-key-row">
            <div><div class="setting-label">API Key</div><div class="setting-desc" id="ai-key-desc">Not needed for Ollama.</div></div>
            <div style="display:flex;gap:8px;align-items:center">
              <input class="input" name="ai.api_key" type="text" value="${get('ai.api_key')}" placeholder="API key…" style="flex:1" autocomplete="off" />
              <a id="ai-get-key-btn" href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" class="btn btn-ghost btn-sm" style="white-space:nowrap;display:none">↗ Get free key</a>
            </div>
          </div>
          <div class="setting-row" id="ai-ollama-row" style="display:none">
            <div><div class="setting-label">Ollama URL</div><div class="setting-desc">Default: http://localhost:11434</div></div>
            <input class="input" name="ai.ollama_url" value="${get('ai.ollama_url')}" placeholder="http://localhost:11434" />
          </div>
        </div>
        <div class="settings-group">
          <div class="group-header">Build &amp; Language</div>
          <div class="setting-row">
            <div><div class="setting-label">Webhook URL</div><div class="setting-desc">POST to this URL to trigger a build</div></div>
            <input class="input" name="build.webhook_url" value="${get('build.webhook_url')}" placeholder="https://api.netlify.com/build/hook/…" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Admin language</div><div class="setting-desc">Interface labels</div></div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-ghost btn-sm lang-btn ${(localStorage.getItem('orb_lang')||'en')==='en'?'active':''}" data-lang="en">EN</button>
              <button class="btn btn-ghost btn-sm lang-btn ${localStorage.getItem('orb_lang')==='de'?'active':''}" data-lang="de">DE</button>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">GitHub</div>
          <div class="setting-row">
            <div><div class="setting-label">GitHub token</div><div class="setting-desc">Personal access token with repo scope</div></div>
            <input class="input" type="password" name="github.token" value="${get('github.token')}" autocomplete="off" placeholder="ghp_…" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Repository</div><div class="setting-desc">owner/repo format</div></div>
            <input class="input" name="github.repo" value="${get('github.repo')}" placeholder="owner/my-site" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Branch</div><div class="setting-desc">Target branch for commits</div></div>
            <input class="input" name="github.branch" value="${get('github.branch')||'main'}" placeholder="main" />
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">Public API</div>
          <div class="setting-row">
            <div><div class="setting-label">Enable public API</div><div class="setting-desc">Expose read-only collection endpoints</div></div>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" name="api.enabled" value="1" ${get('api.enabled')==='1'?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;" />
              <span style="font-size:11px;color:var(--text);font-family:var(--mono);">Enabled</span>
            </label>
          </div>
          <div class="setting-row">
            <div><div class="setting-label">API token</div><div class="setting-desc">Optional bearer token to restrict access</div></div>
            <input class="input" type="password" name="api.token" value="${get('api.token')}" autocomplete="off" placeholder="Leave blank for open access" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Public API collections</div><div class="setting-desc">Collections exposed at <code>/api/public/[collection]</code> without auth. Comma-separated IDs, or <code>*</code> for all. Leave blank to disable.</div></div>
            <input class="input" type="text" name="public.collections" value="${get('public.collections')??''}" placeholder="posts, pages  or  *" style="font-family:var(--mono);font-size:12px;" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Require API key</div><div class="setting-desc">When enabled, all <code>/api/public/</code> requests need a valid Bearer token</div></div>
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" name="api.requireKey" value="1" ${get('api.requireKey')==='1'?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;" />

            <div style="display:flex;justify-content:space-between;width:100%;align-items:center">

            <div><div class="setting-label">Preview token</div><div class="setting-desc">Appended to Preview URLs — allows viewing draft entries on your site</div></div>

              <input class="input" type="text" id="preview-token-display" value="${get('preview.token')??''}" readonly style="flex:1;font-family:var(--mono);font-size:11px;" placeholder="No token generated" />

            </div>
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">Preview URLs</div>
          <div style="padding:10px 20px 4px;font-size:11px;color:var(--muted);line-height:1.6">

          </div>
          <div id="preview-url-rows">
            <div style="padding:14px 20px;font-size:11px;color:var(--muted)">Loading collections…</div>
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">Media</div>
          <div class="setting-row">
            <div><div class="setting-label">Backend</div><div class="setting-desc">Where uploaded files are stored</div></div>
            <select class="input" name="media.backend" id="media-backend-select">
              <option value="blob"   ${(get('media.backend')||'blob')==='blob'   ? 'selected':''}>blob — SQLite BLOB (default)</option>
              <option value="local"  ${get('media.backend')==='local'  ? 'selected':''}>local — filesystem</option>
              <option value="github" ${get('media.backend')==='github' ? 'selected':''}>github — GitHub + jsDelivr CDN</option>
              <option value="s3"     ${get('media.backend')==='s3'     ? 'selected':''}>s3 — S3-compatible (AWS, R2, B2, MinIO)</option>
            </select>
          </div>

          <div id="media-local-fields" style="display:none">
            <div class="setting-row">
              <div><div class="setting-label">Local path</div><div class="setting-desc">Absolute or relative path on the server</div></div>
              <input class="input" name="media.local_path" value="${get('media.local_path')}" placeholder="./media" />
            </div>
          </div>

          <div id="media-s3-fields" style="display:none">
            <div class="setting-row">
              <div><div class="setting-label">Bucket</div></div>
              <input class="input" name="media.s3_bucket" value="${get('media.s3_bucket')}" placeholder="my-media-bucket" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Region</div><div class="setting-desc">AWS region or "auto" for R2</div></div>
              <input class="input" name="media.s3_region" value="${get('media.s3_region')||'auto'}" placeholder="eu-central-1" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Endpoint</div><div class="setting-desc">Custom endpoint for R2, B2, MinIO — leave blank for AWS</div></div>
              <input class="input" name="media.s3_endpoint" value="${get('media.s3_endpoint')}" placeholder="https://xxxx.r2.cloudflarestorage.com" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Access Key ID</div></div>
              <input class="input" type="password" name="media.s3_access_key" value="${get('media.s3_access_key')}" autocomplete="off" placeholder="Access key ID" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Secret Access Key</div></div>
              <input class="input" type="password" name="media.s3_secret_key" value="${get('media.s3_secret_key')}" autocomplete="off" placeholder="Secret access key" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Public URL</div><div class="setting-desc">Base URL for serving files, e.g. your R2 public domain or CDN</div></div>
              <input class="input" name="media.s3_public_url" value="${get('media.s3_public_url')}" placeholder="https://media.example.com" />
            </div>
          </div>

          <div id="media-github-fields" style="display:none">
            <div class="setting-row">
              <div><div class="setting-label">GitHub token</div><div class="setting-desc">Uses the token from the GitHub section above if left blank</div></div>
              <input class="input" type="password" name="media.github_token" value="${get('media.github_token')}" autocomplete="off" placeholder="ghp_… (optional, falls back to GitHub token above)" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Repository</div><div class="setting-desc">owner/repo — can differ from your content repo</div></div>
              <input class="input" name="media.github_repo" value="${get('media.github_repo')}" placeholder="owner/my-media" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Branch</div></div>
              <input class="input" name="media.github_branch" value="${get('media.github_branch')||'main'}" placeholder="main" />
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Directory</div><div class="setting-desc">Subdirectory inside the repo</div></div>
              <input class="input" name="media.github_dir" value="${get('media.github_dir')||'media'}" placeholder="media" />
            </div>
          </div>
          <div style="padding:6px 20px;border-top:1px solid var(--line);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;"><span style="font-size:4px;color:var(--gold)">◆</span>Image optimization</div>
          <div class="setting-row">
            <div><div class="setting-label">Max width</div><div class="setting-desc">Images wider than this are resized on upload (px). Leave blank to disable.</div></div>
            <input class="input" name="media.img_max_width" type="number" min="400" max="8000" step="100" value="${get('media.img_max_width')||'2400'}" placeholder="2400" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Quality</div><div class="setting-desc">JPEG / WebP / AVIF compression quality (1–100)</div></div>
            <input class="input" name="media.img_quality" type="number" min="1" max="100" value="${get('media.img_quality')||'85'}" placeholder="85" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Convert to WebP</div><div class="setting-desc">Auto-convert JPEG and PNG uploads to WebP on ingest — smaller files, same quality</div></div>
            <label class="toggle"><input type="checkbox" name="media.img_convert_webp" value="1" ${get('media.img_convert_webp')==='1'?'checked':''} /><span class="toggle-slider"></span></label>
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">Email notifications</div>
          <div class="setting-row">
            <div><div class="setting-label">SMTP host</div><div class="setting-desc">e.g. smtp.fastmail.com, smtp.gmail.com</div></div>
            <input class="input" name="email.smtp_host" value="${get('email.smtp_host')||''}" placeholder="smtp.example.com" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">SMTP port</div><div class="setting-desc">Usually 587 (STARTTLS) or 465 (SSL)</div></div>
            <input class="input" name="email.smtp_port" type="number" value="${get('email.smtp_port')||'587'}" placeholder="587" style="max-width:100px" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">SMTP username</div></div>
            <input class="input" name="email.smtp_user" value="${get('email.smtp_user')||''}" placeholder="you@example.com" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">SMTP password</div></div>
            <input class="input" type="password" name="email.smtp_pass" value="${get('email.smtp_pass')||''}" placeholder="••••••••" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">From address</div><div class="setting-desc">Defaults to SMTP username if blank</div></div>
            <input class="input" name="email.smtp_from" value="${get('email.smtp_from')||''}" placeholder="Orbiter &lt;noreply@example.com&gt;" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Notify to</div><div class="setting-desc">Recipient email address for notifications</div></div>
            <input class="input" name="email.notify_to" value="${get('email.notify_to')||''}" placeholder="admin@example.com" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Notify on publish</div><div class="setting-desc">Send email when an entry is published</div></div>
            <input type="checkbox" name="email.notify_publish" value="1" ${get('email.notify_publish')==='1'?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Notify on comment</div><div class="setting-desc">Send email when a new comment is posted</div></div>
            <input type="checkbox" name="email.notify_comment" value="1" ${get('email.notify_comment')==='1'?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Notify on form submission</div><div class="setting-desc">Send email when a contact form is submitted</div></div>
            <input type="checkbox" name="email.notify_form" value="1" ${get('email.notify_form')==='1'?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;" />
          </div>
        </div>

        <div class="settings-group" style="grid-column:1/-1">
          <div class="group-header">Import</div>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 20px">
            <div>
              <div class="setting-label" style="margin-bottom:5px">Import content</div>
              <div class="setting-desc">Supports <strong style="color:var(--text);font-weight:500">WordPress WXR</strong> (.xml export), <strong style="color:var(--text);font-weight:500">JSON</strong>, and <strong style="color:var(--text);font-weight:500">CSV</strong>. Entries are matched to existing collections by field name. Images and media are imported automatically.</div>
            </div>
            <a class="btn btn-primary" href="/import.html" style="white-space:nowrap;flex-shrink:0">⬆ Open importer</a>
          </div>
        </div>

        <div class="settings-group" style="grid-column:1/-1">
          <div class="group-header">Templates</div>
          <div id="tpl-banner" class="banner" style="display:none;margin:8px 20px 0"></div>
          <div style="padding:14px 20px;border-bottom:1px solid var(--line2)">
            <div class="setting-label" style="margin-bottom:6px">Add built-in template</div>
            <div class="setting-desc" style="margin-bottom:12px">Install pre-built collection schemas into this pod. Existing collections are not overwritten.</div>
            <div id="tpl-available" style="display:flex;flex-wrap:wrap;gap:8px;">
              <span style="font-size:11px;color:var(--muted)">Loading…</span>
            </div>
          </div>
          <div style="display:flex;gap:12px;padding:14px 20px;flex-wrap:wrap;align-items:flex-start">
            <div style="flex:1;min-width:240px;">
              <div class="setting-label" style="margin-bottom:6px">Export collections as template</div>
              <div class="setting-desc" style="margin-bottom:10px">Select collections and download as a shareable JSON template file.</div>
              <div id="tpl-export-cols" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px"></div>
              <div style="display:flex;gap:8px;align-items:center">
                <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none">
                  <input type="checkbox" id="tpl-export-entries" checked style="accent-color:var(--accent);width:13px;height:13px;" />
                  Include sample entries
                </label>
                <button type="button" class="btn btn-ghost btn-sm" id="tpl-export-btn" disabled>⬇ Export</button>
              </div>
            </div>
            <div style="flex:1;min-width:240px;">
              <div class="setting-label" style="margin-bottom:6px">Import template from file</div>
              <div class="setting-desc" style="margin-bottom:10px">Upload a <code style="font-family:var(--mono);font-size:10px;background:var(--bg3);padding:1px 5px;border-radius:3px">.orbiter-template.json</code> file to add its collections.</div>
              <div style="display:flex;gap:8px;align-items:center">
                <button type="button" class="btn btn-ghost btn-sm" id="tpl-import-btn">⬆ Import template</button>
                <span id="tpl-import-status" style="font-size:10px;color:var(--muted)"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="settings-group" style="grid-column:1/-1">
          <div class="group-header">FTP / FTPS Deploy</div>
          <div class="setting-row">
            <div><div class="setting-label">FTP host</div><div class="setting-desc">e.g. ftp.world4you.com or ftp.strato.de</div></div>
            <input class="input" name="ftp.host" value="${get('ftp.host')||''}" placeholder="ftp.example.com" autocomplete="off" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Port</div><div class="setting-desc">21 for FTP (default), 990 for implicit FTPS</div></div>
            <input class="input" name="ftp.port" type="number" value="${get('ftp.port')||'21'}" placeholder="21" style="max-width:100px" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Username</div></div>
            <input class="input" name="ftp.user" value="${get('ftp.user')||''}" placeholder="u12345678" autocomplete="off" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Password</div></div>
            <input class="input" type="password" name="ftp.password" value="${get('ftp.password')||''}" autocomplete="off" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Use FTPS</div><div class="setting-desc">Secure FTP over TLS (explicit mode)</div></div>
            <input type="checkbox" name="ftp.secure" value="1" ${get('ftp.secure')==='1'?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Remote path</div><div class="setting-desc">Target folder on the server</div></div>
            <input class="input" name="ftp.remote_path" value="${get('ftp.remote_path')||''}" placeholder="/public_html" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Local dist path</div><div class="setting-desc">Absolute path to your Astro <code style="font-family:var(--mono);font-size:10px;background:var(--bg3);padding:1px 5px;border-radius:3px">dist/</code> folder on this machine</div></div>
            <input class="input" name="ftp.local_path" value="${get('ftp.local_path')||''}" placeholder="/Users/me/my-site/dist" />
          </div>
          <div class="setting-row">
            <div><div class="setting-label">Auto-deploy after build</div><div class="setting-desc">Upload via FTP automatically after a successful build webhook</div></div>
            <input type="checkbox" name="ftp.auto_deploy" value="1" ${get('ftp.auto_deploy')==='1'?'checked':''} style="accent-color:var(--accent);width:14px;height:14px;" />
          </div>
          <div class="save-row" style="justify-content:flex-start;gap:14px">
            <button type="button" class="btn btn-ghost" id="ftp-test-btn">Test connection</button>
            <span id="ftp-test-result" style="font-size:11px;color:var(--muted)"></span>
          </div>
        </div>

        </div><!-- /settings-grid -->
      </form>

      <!-- GitHub Sync (conditional) -->
      <div id="github-banner" class="banner" style="display:none"></div>
      ${ghConfigured ? `
      <div class="settings-group">
        <div class="group-header">GitHub Sync</div>
        <div class="setting-row">
          <div>
            <div class="setting-label">Push to GitHub</div>
            <div class="setting-desc">Commits pod + media to your repo. Triggers a rebuild if you have a GitHub Actions workflow.</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn-save" id="github-push-btn">Push now</button>
            <a class="btn btn-ghost btn-sm" href="/api/github/workflow" download title="Download GitHub Actions workflow file">⬇ Workflow</a>
          </div>
        </div>
      </div>
      ` : ''}

      <!-- placeholder — Account moved to bottom -->

                <span style="background:#566070"></span>
                <span style="background:#6b8c6e"></span>
                <span style="background:#ad7575"></span>
              </div>
              <div class="theme-card-name">Zen</div>
              <div class="theme-card-sub">Japandi · slate &amp; mauve</div>
            </button>
            <button class="theme-card ${currentTheme==='catppuccin'?'active':''}" data-theme="catppuccin">
              <div class="theme-swatch">

            <div><div class="setting-label">Current password</div></div>
            <input class="input" type="password" name="current_password" autocomplete="current-password" required />

    // Preview token generator
    // API Keys
    async function renderApiKeys() {
      const list = document.getElementById('api-keys-list');
      if (!list) return;
      const res = await fetch('/api/api-keys', { credentials: 'include' }).catch(() => null);
      if (!res?.ok) { list.innerHTML = '<span style="color:var(--muted)">Could not load keys</span>'; return; }
      const { keys } = await res.json();
      if (!keys.length) { list.innerHTML = '<span style="color:var(--muted)">No keys yet</span>'; return; }
      list.innerHTML = keys.map(k => `
        <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--panel-alt,var(--sidebar-bg));border-radius:6px;border:1px solid var(--line)">
          <span style="flex:1;font-family:var(--mono);font-size:10px;color:var(--heading)">${k.label}</span>
          <span style="font-family:var(--mono);font-size:9px;color:var(--muted)">${k.key}</span>
          <span style="font-size:9px;color:var(--muted)">${k.hits} hits</span>
          <span style="font-size:9px;color:var(--muted)">${k.created}</span>
          <button type="button" class="btn btn-ghost btn-sm" style="color:var(--danger,#e55)" data-key-id="${k.id}">Revoke</button>
        </div>`).join('');
      list.querySelectorAll('[data-key-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Revoke this API key?')) return;
          await fetch(`/api/api-keys/${btn.dataset.keyId}`, { method: 'DELETE', credentials: 'include' });
          renderApiKeys();
        });
      });
    }
    renderApiKeys();

    document.getElementById('btn-gen-api-key')?.addEventListener('click', async () => {
      const label = prompt('Label for this key (e.g. "Frontend", "Mobile app"):');
      if (label === null) return;
      const res = await fetch('/api/api-keys', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ label: label || 'API Key' }),
      });
      const { key } = await res.json();
      prompt(`New API key (copy it now — shown once):\n`, key.key);
      renderApiKeys();
    });

    document.getElementById('btn-gen-preview-token')?.addEventListener('click', async () => {
      const token = Array.from(crypto.getRandomValues(new Uint8Array(24))).map(b=>b.toString(16).padStart(2,'0')).join('');
      document.getElementById('preview-token-display').value = token;
      await fetch('/api/meta/preview.token', {
        method: 'PUT', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value: token }),
      });
    });

      const json = await res.json();

      ghPushBtn.textContent = 'Push now';

        const root = document.documentElement;
        if (theme === 'space') root.removeAttribute('data-theme');
        else root.setAttribute('data-theme', theme);
        localStorage.setItem('orb_theme', theme);
        await saveMeta([['ui.theme', theme]]);
      });
    });

        const root = document.documentElement;
        root.removeAttribute('data-scheme');
        if (s === 'dark')  root.setAttribute('data-scheme', 'dark');
        if (s === 'light') root.setAttribute('data-scheme', 'light');
        localStorage.setItem('orb_scheme', s);
        // Update topbar toggle icon
        const t = document.getElementById('scheme-toggle');
        if (t) t.textContent = s === 'dark' ? '●' : s === 'light' ? '○' : '◐';

        root.removeAttribute('data-style');

      anthropic: 'Requires API key from <a href="https://console.anthropic.com/" target="_blank" style="color:var(--accent)">console.anthropic.com</a>. Pay-per-use.',

    const AI_KEY_URLS = {

    document.getElementById('un-form').addEventListener('submit', async e => {

      fetch('/api/info',  { credentials:'include' }).then(r => r.json()).catch(() => ({})),

    ]);

    const pf = document.getElementById('pod-path-field');
    const vf = document.getElementById('pod-version-field');
    const av = document.getElementById('pod-admin-ver');
    const up = document.getElementById('pod-uptime');
    const cl = document.getElementById('pod-collections-list');
    const tc = document.getElementById('pod-total-entries');
    const cc = document.getElementById('pod-col-count');

    if (pf) pf.textContent = info.podPath ?? health.pod ?? '—';
    if (vf) vf.textContent = `v${info.formatVersion ?? 1}`;
    if (av) av.textContent = health.version ? `v${health.version}` : '—';
    if (up && health.uptime != null) {
      const s = health.uptime, h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
      up.textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;

    // Nav config state
    const navHiddenSet = new Set((info.nav?.hidden) || []);
    let navGroupsObj = info.nav?.groups || {};
    if (typeof navGroupsObj !== 'object' || navGroupsObj === null) navGroupsObj = {};
    const existingGroupNames = () => Object.keys(navGroupsObj);
    const colGroupOf = (colId) => {
      for (const [g, ids] of Object.entries(navGroupsObj)) {
        if (Array.isArray(ids) && ids.includes(colId)) return g;
      }
      return '';
    };

    if (cl) {
      const cols = info.collections ?? [];
      const total = cols.reduce((n, c) => n + (c.total ?? 0), 0);
      if (tc) tc.textContent = total;
      if (cc) cc.textContent = cols.length;

      function renderNavColList() {
        const groups = existingGroupNames();
        cl.innerHTML = cols.length
          ? cols.map(c => {
              const hidden = navHiddenSet.has(c.id);
              const group  = colGroupOf(c.id);
              return `<div class="pod-col-row" style="gap:8px">
                <label class="toggle" style="flex-shrink:0" title="${hidden ? 'Hidden' : 'Visible'}">
                  <input type="checkbox" class="nav-vis-cb" data-col="${c.id}" ${hidden ? '' : 'checked'} />
                  <span class="toggle-slider"></span>
                </label>
                <span class="pod-col-name" style="flex:1;${hidden ? 'opacity:.4' : ''}">${c.label}</span>

                  <option value="">— no group —</option>
                  ${groups.map(g => `<option value="${g}" ${group===g?'selected':''}>${g}</option>`).join('')}
                </select>
                <span class="pod-col-count">${c.total ?? 0}</span>
              </div>`;
            }).join('')
          : '<div class="pod-col-row"><span class="pod-col-name" style="color:var(--muted)">No collections</span></div>';

        cl.querySelectorAll('.nav-vis-cb').forEach(cb => {
          cb.addEventListener('change', () => {
            if (cb.checked) navHiddenSet.delete(cb.dataset.col);
            else navHiddenSet.add(cb.dataset.col);
          });
        });
        cl.querySelectorAll('.nav-group-sel').forEach(sel => {
          sel.addEventListener('change', () => {
            const colId = sel.dataset.col;
            for (const [g, ids] of Object.entries(navGroupsObj)) {
              const idx = ids.indexOf(colId);
              if (idx !== -1) ids.splice(idx, 1);
            }
            if (sel.value) {
              if (!navGroupsObj[sel.value]) navGroupsObj[sel.value] = [];
              navGroupsObj[sel.value].push(colId);
            }
          });
        });
      }
      renderNavColList();

      document.getElementById('nav-add-group-btn')?.addEventListener('click', () => {
        const inp = document.getElementById('nav-new-group');
        const name = inp?.value.trim();
        if (!name) return;
        if (!navGroupsObj[name]) navGroupsObj[name] = [];
        inp.value = '';
        renderNavColList();
      });

      document.getElementById('nav-save-btn')?.addEventListener('click', async () => {
        const cleanGroups = {};
        for (const [g, ids] of Object.entries(navGroupsObj)) {
          if (ids.length) cleanGroups[g] = ids;
        }
        await saveMeta([
          ['nav.hidden', [...navHiddenSet].join(',')],
          ['nav.groups', Object.keys(cleanGroups).length ? JSON.stringify(cleanGroups) : ''],
        ]);
        showBanner('site-banner', 'banner-ok', 'Navigation saved — reloading…');
        setTimeout(() => location.reload(), 600);
      });
    }

    // ── Templates ──────────────────────────────────────────────────────
    function tplBanner(cls, text) {
      const el = document.getElementById('tpl-banner');
      if (!el) return;
      el.className = 'banner ' + cls;
      el.textContent = (cls === 'banner-ok' ? '✓ ' : '✕ ') + text;
      el.style.display = '';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    // Available built-in templates
    async function loadAvailableTemplates() {
      const templates = await fetch('/api/templates/available', { credentials: 'include' }).then(r => r.json()).catch(() => []);
      const wrap = document.getElementById('tpl-available');
      if (!wrap) return;
      wrap.innerHTML = templates.map(t => `
        <button type="button" class="btn btn-ghost btn-sm tpl-install-btn" data-id="${t.id}"
          ${t.installed ? 'disabled style="opacity:.5"' : ''}
          title="${t.description}">
          ${t.installed ? '✓ ' : t.partial ? '◐ ' : '+ '}${t.label}
        </button>
      `).join('');
      wrap.querySelectorAll('.tpl-install-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Installing…';
          const res = await fetch(`/api/templates/install/${btn.dataset.id}`, { method: 'POST', credentials: 'include' });
          const json = await res.json();
          if (res.ok) {
            tplBanner('banner-ok', `Installed: ${json.created.join(', ')}${json.skipped.length ? ' (skipped: ' + json.skipped.join(', ') + ')' : ''} — ${json.entries} sample entries`);
            btn.textContent = '✓ ' + btn.textContent.replace('Installing…', '').trim();
          } else {
            tplBanner('banner-err', json.error || 'Install failed');
            btn.disabled = false;
          }
          loadAvailableTemplates();
          // Refresh pod info + export checkboxes
          refreshExportCols();
        });
      });
    }

    // Export: collection checkboxes
    async function refreshExportCols() {
      const cols = await fetch('/api/collections', { credentials: 'include' }).then(r => r.json()).catch(() => []);
      const wrap = document.getElementById('tpl-export-cols');
      if (!wrap) return;
      wrap.innerHTML = cols.map(c => `
        <label style="font-size:10px;display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;padding:3px 8px;border:1px solid var(--line);border-radius:4px;background:var(--bg0);transition:border-color .12s;">
          <input type="checkbox" class="tpl-exp-cb" value="${c.id}" style="accent-color:var(--accent);width:12px;height:12px;" />
          ${c.label}
        </label>
      `).join('');
      const exportBtn = document.getElementById('tpl-export-btn');
      wrap.querySelectorAll('.tpl-exp-cb').forEach(cb => {
        cb.addEventListener('change', () => {
          const any = wrap.querySelectorAll('.tpl-exp-cb:checked').length > 0;
          exportBtn.disabled = !any;
        });
      });
    }

    // Export button
    document.getElementById('tpl-export-btn')?.addEventListener('click', async () => {
      const checked = [...document.querySelectorAll('.tpl-exp-cb:checked')].map(cb => cb.value);
      if (!checked.length) return;
      const includeEntries = document.getElementById('tpl-export-entries')?.checked ?? true;
      const res = await fetch('/api/templates/export', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collections: checked, includeSampleEntries: includeEntries }),
      });
      if (!res.ok) { tplBanner('banner-err', 'Export failed'); return; }
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url;
      a.download = `${data.id}.orbiter-template.json`;
      a.click();
      URL.revokeObjectURL(url);
      tplBanner('banner-ok', `Exported ${checked.length} collection(s)`);
    });

    // Import button
    document.getElementById('tpl-import-btn')?.addEventListener('click', () => {
      const fi = document.createElement('input');
      fi.type = 'file';
      fi.accept = '.json,.orbiter-template.json';
      fi.onchange = async () => {
        const file = fi.files[0];
        if (!file) return;
        const status = document.getElementById('tpl-import-status');
        if (status) status.textContent = 'Importing…';
        try {
          const text = await file.text();
          const template = JSON.parse(text);
          if (!template.collections) throw new Error('Invalid template file');
          const res = await fetch('/api/templates/import', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: text,
          });
          const json = await res.json();
          if (res.ok) {
            tplBanner('banner-ok', `Imported: ${json.created.join(', ') || 'none new'}${json.skipped.length ? ' (skipped: ' + json.skipped.join(', ') + ')' : ''} — ${json.entries} entries`);
            if (status) status.textContent = '';
            loadAvailableTemplates();
            refreshExportCols();
          } else {
            tplBanner('banner-err', json.error || 'Import failed');
            if (status) status.textContent = '';
          }
        } catch (e) {
          tplBanner('banner-err', 'Invalid template file: ' + e.message);
          if (status) status.textContent = '';
        }
      };
      fi.click();
    });

    loadAvailableTemplates();
    refreshExportCols();
  </script>
</main>
  </div>

  <script src="/search.js"></script>
  <script src="/sidebar.js"></script>
  <script src="/router.js"></script>
</body>
</html>
